# Deploy frontend to Vercel when you push to main.
#
# I cannot log into https://vercel.com or https://dashboard.render.com/ as you —
# add these GitHub repository secrets once, then every push deploys automatically.
#
# Secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN          — https://vercel.com/account/tokens
#   VERCEL_ORG_ID         — Project Settings → General
#   VERCEL_PROJECT_ID     — Project Settings → General
#   VITE_API_BASE_URL     — e.g. https://your-api.onrender.com/api/v1
#
name: Deploy frontend to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
