services:
  - type: web
    name: secure-rbac-task-manager-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        fromDatabase:
          name: secure-rbac-task-manager-mongo
          property: connectionString
      - key: JWT_SECRET
        sync: false

databases:
  - name: secure-rbac-task-manager-mongo
    plan: free
    databaseName: secure_rbac_task_manager
