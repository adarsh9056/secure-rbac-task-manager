services:
  mongo:
    image: mongo:7
    container_name: secure-rbac-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secure-rbac-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/secure-rbac-task-manager
      JWT_SECRET: change_me_in_production
    depends_on:
      - mongo

volumes:
  mongo_data:
